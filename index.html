<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main">
    <h2 id="title">Student Grade Calulator</h2>
    <div class="form">
    Student's name: <input type="text" placeholder="Enter the name of the student">
    Teacher's name: <input type="text" placeholder="Enter the Teacher's name">
    Subject 1: <input type="number" id="subject1" placeholder="Enter subject 1 Marks">
    Subject 2: <input type="number" id="subject2" placeholder="Enter subject 2 Marks">
    Subject 3: <input type="number" id="subject3" placeholder="Enter subject 3 Marks">
    Subject 4: <input type="number" id="subject4" placeholder="Enter subject 4 Marks">
    <button id="calculateResult">Calculate Result</button>
    <h3 id="result"> </h3>
    <h3 id="status"></h3>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
